name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    # --- NUEVO PASO PARA LIBERAR ESPACIO ---
    - name: Liberar espacio en disco
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    - name: Instalar Dependencias (CPU)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libopenblas-dev liblapack-dev libfftw3-dev

    - name: Instalar CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.15
      id: cuda-toolkit
      with:
        cuda: '12.4.0'

    - name: Compilar con Make
      run: |
        make clean
        make -j$(nproc)
